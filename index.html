<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Control</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

/* LOGIN */

.auth{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.auth-card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:35px;
    border-radius:25px;
    backdrop-filter:blur(12px);
}

.auth-card h1{
    text-align:center;
    margin-bottom:25px;
    color:#00f5a0;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
}

.form-group input,
.form-group select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#00f5a0;
    color:#0f172a;
    font-weight:700;
    cursor:pointer;
    font-size:1rem;
}

.switch{
    text-align:center;
    margin-top:15px;
    cursor:pointer;
    color:#00f5a0;
}

/* APP */

#app{
    display:none;
}

.navbar{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    margin-top:20px;
    backdrop-filter:blur(10px);
}

.logo{
    font-size:1.5rem;
    font-weight:700;
    color:#00f5a0;
}

.hero{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.balance h1{
    margin-top:10px;
    color:#00f5a0;
    font-size:2.5rem;
}

.income-expense{
    display:flex;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}

.box{
    flex:1;
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
}

.income{
    color:#00f5a0;
    font-size:1.3rem;
    font-weight:bold;
}

.expense{
    color:#ff4d6d;
    font-size:1.3rem;
    font-weight:bold;
}

.transactions{
    margin-top:30px;
}

.transaction{
    background:rgba(255,255,255,0.05);
    padding:18px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.positive{
    color:#00f5a0;
    font-weight:bold;
}

.negative{
    color:#ff4d6d;
    font-weight:bold;
}

.logout-btn{
    width:auto;
    padding:10px 18px;
    background:#ff4d6d;
    color:white;
}

.delete-btn{
    width:auto;
    padding:8px 12px;
    background:#ff4d6d;
    color:white;
    border-radius:10px;
}

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .transaction{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

}

</style>
</head>

<body>

<!-- LOGIN -->
<section class="auth" id="authSection">

    <div class="auth-card">

        <h1>
            Finance Control
        </h1>

        <div class="form-group">
            <label>Usuário</label>
            <input type="text" id="username">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password">
        </div>

        <button onclick="handleAuth()" id="authButton">
            Entrar
        </button>

        <div class="switch" onclick="toggleMode()">
            Criar conta
        </div>

    </div>

</section>

<!-- APP -->
<div class="container" id="app">

    <nav class="navbar">

        <div class="logo">
            <i class="fa-solid fa-wallet"></i>
            FinanceControl
        </div>

        <button class="logout-btn" onclick="logout()">
            Sair
        </button>

    </nav>

    <section class="hero">

        <div class="card balance">

            <p>Saldo Total</p>

            <h1 id="balance">
                R$ 0,00
            </h1>

            <div class="income-expense">

                <div class="box">
                    <p>Entradas</p>

                    <div class="income" id="income">
                        + R$ 0,00
                    </div>
                </div>

                <div class="box">
                    <p>Saídas</p>

                    <div class="expense" id="expense">
                        - R$ 0,00
                    </div>
                </div>

            </div>

        </div>

        <div class="card">

            <h2 style="margin-bottom:20px;">
                Nova Transação
            </h2>

            <div class="form-group">
                <label>Descrição</label>

                <input type="text"
                id="description"
                placeholder="Ex: Mercado">
            </div>

            <div class="form-group">
                <label>Valor</label>

                <input type="number"
                id="amount"
                placeholder="Ex: 150">
            </div>

            <div class="form-group">
                <label>Tipo</label>

                <select id="type">
                    <option value="income">
                        Entrada
                    </option>

                    <option value="expense">
                        Saída
                    </option>
                </select>
            </div>

            <button onclick="addTransaction()">
                Adicionar
            </button>

        </div>

    </section>

    <section class="transactions">

        <h2 style="margin-bottom:20px;">
            Transações
        </h2>

        <div id="transactionList"></div>

    </section>

</div>

<script>

/* =========================
   SISTEMA DE LOGIN
========================= */

let isLogin = true;
let currentUser = null;
let transactions = [];

function toggleMode(){

    isLogin = !isLogin;

    document.getElementById('authButton')
    .innerText = isLogin
    ? 'Entrar'
    : 'Criar Conta';

    document.querySelector('.switch')
    .innerText = isLogin
    ? 'Criar conta'
    : 'Já tenho conta';

}

function handleAuth(){

    const username =
    document.getElementById('username').value;

    const password =
    document.getElementById('password').value;

    if(!username || !password){

        alert('Preencha todos os campos!');
        return;
    }

    let users =
    JSON.parse(localStorage.getItem('users')) || {};

    if(isLogin){

        if(
            users[username] &&
            users[username].password === password
        ){

            currentUser = username;

            startApp();

        }else{

            alert('Usuário ou senha incorretos');

        }

    }else{

        if(users[username]){

            alert('Usuário já existe');
            return;

        }

        users[username] = {
            password: password,
            transactions: []
        };

        localStorage.setItem(
            'users',
            JSON.stringify(users)
        );

        alert('Conta criada com sucesso!');

        toggleMode();

    }

}

/* =========================
   APP
========================= */

function startApp(){

    document.getElementById('authSection')
    .style.display = 'none';

    document.getElementById('app')
    .style.display = 'block';

    loadTransactions();

}

function logout(){

    location.reload();

}

function loadTransactions(){

    let users =
    JSON.parse(localStorage.getItem('users')) || {};

    transactions =
    users[currentUser].transactions || [];

    updateUI();

}

function saveTransactions(){

    let users =
    JSON.parse(localStorage.getItem('users')) || {};

    users[currentUser].transactions =
    transactions;

    localStorage.setItem(
        'users',
        JSON.stringify(users)
    );

}

function formatCurrency(value){

    return value.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
    });

}

function updateUI(){

    const list =
    document.getElementById('transactionList');

    list.innerHTML = '';

    let income = 0;
    let expense = 0;

    transactions.forEach((transaction,index) => {

        if(transaction.type === 'income'){
            income += transaction.amount;
        }else{
            expense += transaction.amount;
        }

        const div =
        document.createElement('div');

        div.classList.add('transaction');

        div.innerHTML = `

            <div>
                <strong>
                    ${transaction.description}
                </strong>
            </div>

            <div style="
                display:flex;
                align-items:center;
                gap:15px;
            ">

                <div class="${
                    transaction.type === 'income'
                    ? 'positive'
                    : 'negative'
                }">

                    ${
                        transaction.type === 'income'
                        ? '+'
                        : '-'
                    }

                    ${formatCurrency(transaction.amount)}

                </div>

                <button
                class="delete-btn"
                onclick="removeTransaction(${index})">

                    <i class="fa-solid fa-trash"></i>

                </button>

            </div>

        `;

        list.appendChild(div);

    });

    document.getElementById('income')
    .innerText =
    '+ ' + formatCurrency(income);

    document.getElementById('expense')
    .innerText =
    '- ' + formatCurrency(expense);

    document.getElementById('balance')
    .innerText =
    formatCurrency(income - expense);

}

function addTransaction(){

    const description =
    document.getElementById('description').value;

    const amount =
    Number(document.getElementById('amount').value);

    const type =
    document.getElementById('type').value;

    if(description === '' || amount <= 0){

        alert('Preencha os campos!');
        return;

    }

    transactions.push({
        description,
        amount,
        type
    });

    saveTransactions();

    updateUI();

    document.getElementById('description').value = '';
    document.getElementById('amount').value = '';

}

function removeTransaction(index){

    transactions.splice(index,1);

    saveTransactions();

    updateUI();

}

</script>

</body>
</html>
