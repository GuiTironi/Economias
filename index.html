<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Control</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background: linear-gradient(135deg,#07111f,#0f172a,#111827);
      min-height:100vh;
      color:white;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:#00f5a0;
      filter:blur(180px);
      opacity:.15;
      top:-200px;
      left:-150px;
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:#00d9ff;
      filter:blur(180px);
      opacity:.12;
      bottom:-200px;
      right:-150px;
      z-index:-1;
    }

    .container{
      width:100%;
      max-width:1400px;
      margin:auto;
      padding:20px;
    }

    /* NAVBAR */

    .navbar{
      width:100%;
      padding:18px 30px;
      border-radius:20px;
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.08);

      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:1.4rem;
      font-weight:700;
      color:#00f5a0;
    }

    .menu{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .menu a{
      text-decoration:none;
      color:white;
      opacity:.8;
      transition:.3s;
    }

    .menu a:hover{
      color:#00f5a0;
      opacity:1;
    }

    /* HERO */

    .hero{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:25px;
      margin-bottom:30px;
    }

    .card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(15px);
      border-radius:25px;
      padding:25px;
      transition:.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#00f5a0;
    }

    .balance h1{
      margin-top:10px;
      font-size:2.6rem;
      color:#00f5a0;
    }

    .small{
      opacity:.7;
      font-size:.9rem;
    }

    .income-expense{
      display:flex;
      gap:20px;
      margin-top:25px;
      flex-wrap:wrap;
    }

    .box{
      flex:1;
      min-width:140px;
      background:rgba(255,255,255,.05);
      padding:18px;
      border-radius:18px;
    }

    .box h3{
      margin-bottom:10px;
      font-size:1rem;
      opacity:.8;
    }

    .income{
      color:#00f5a0;
      font-weight:600;
      font-size:1.4rem;
    }

    .expense{
      color:#ff5f7a;
      font-weight:600;
      font-size:1.4rem;
    }

    /* FORM */

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-size:.95rem;
    }

    .form-group input,
    .form-group select{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      color:white;
      font-size:1rem;
    }

    .form-group input::placeholder{
      color:rgba(255,255,255,.5);
    }

    button{
      width:100%;
      border:none;
      padding:15px;
      border-radius:15px;
      background:linear-gradient(90deg,#00f5a0,#00d9ff);
      color:#07111f;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      transform:scale(1.02);
    }

    /* TRANSAÇÕES */

    .transactions{
      margin-top:30px;
    }

    .transactions-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
      gap:10px;
    }

    .transaction-list{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .transaction{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,255,255,.05);
      padding:18px;
      border-radius:18px;
      flex-wrap:wrap;
      gap:15px;
    }

    .transaction-info{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .icon{
      width:50px;
      height:50px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.2rem;
    }

    .green{
      background:rgba(0,245,160,.15);
      color:#00f5a0;
    }

    .red{
      background:rgba(255,95,122,.15);
      color:#ff5f7a;
    }

    .transaction-value{
      font-weight:700;
      font-size:1.1rem;
    }

    .positive{
      color:#00f5a0;
    }

    .negative{
      color:#ff5f7a;
    }

    /* RESPONSIVO */

    @media(max-width:768px){

      .navbar{
        flex-direction:column;
        gap:15px;
      }

      .menu{
        justify-content:center;
      }

      .balance h1{
        font-size:2rem;
      }

      .transaction{
        flex-direction:column;
        align-items:flex-start;
      }

      .transaction-value{
        margin-left:65px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="logo">
        <i class="fa-solid fa-wallet"></i>
        FinanceControl
      </div>

      <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Transações</a>
        <a href="#">Metas</a>
        <a href="#">Perfil</a>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">

      <!-- SALDO -->
      <div class="card balance">
        <p class="small">Saldo Total</p>
        <h1 id="balance">R$ 0,00</h1>

        <div class="income-expense">

          <div class="box">
            <h3>Entradas</h3>
            <p class="income" id="income">
              + R$ 0,00
            </p>
          </div>

          <div class="box">
            <h3>Saídas</h3>
            <p class="expense" id="expense">
              - R$ 0,00
            </p>
          </div>

        </div>
      </div>

      <!-- FORM -->
      <div class="card">
        <h2 style="margin-bottom:20px;">
          Nova Transação
        </h2>

        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="description" placeholder="Ex: Mercado">
        </div>

        <div class="form-group">
          <label>Valor</label>
          <input type="number" id="amount" placeholder="Ex: 150">
        </div>

        <div class="form-group">
          <label>Tipo</label>

          <select id="type">
            <option value="income">Entrada</option>
            <option value="expense">Saída</option>
          </select>
        </div>

        <button onclick="addTransaction()">
          Adicionar Transação
        </button>
      </div>

    </section>

    <!-- TRANSAÇÕES -->
    <section class="transactions">

      <div class="transactions-header">
        <h2>Últimas Transações</h2>
      </div>

      <div class="transaction-list" id="transactionList">

      </div>

    </section>

  </div>

  <script>
    let transactions = [];

    function formatCurrency(value){
      return value.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
      });
    }

    function updateUI(){

      const transactionList = document.getElementById('transactionList');

      transactionList.innerHTML = '';

      let income = 0;
      let expense = 0;

      transactions.forEach(transaction => {

        if(transaction.type === 'income'){
          income += transaction.amount;
        }else{
          expense += transaction.amount;
        }

        const div = document.createElement('div');

        div.classList.add('transaction');

        div.innerHTML = `
          <div class="transaction-info">

            <div class="icon ${
              transaction.type === 'income'
              ? 'green'
              : 'red'
            }">

              <i class="fa-solid ${
                transaction.type === 'income'
                ? 'fa-arrow-trend-up'
                : 'fa-arrow-trend-down'
              }"></i>

            </div>

            <div>
              <h4>${transaction.description}</h4>
              <p class="small">${transaction.type === 'income'
                ? 'Entrada'
                : 'Saída'
              }</p>
            </div>

          </div>

          <div class="transaction-value ${
            transaction.type === 'income'
            ? 'positive'
            : 'negative'
          }">

            ${
              transaction.type === 'income'
              ? '+'
              : '-'
            }

            ${formatCurrency(transaction.amount)}

          </div>
        `;

        transactionList.appendChild(div);

      });

      document.getElementById('income').innerText =
        '+ ' + formatCurrency(income);

      document.getElementById('expense').innerText =
        '- ' + formatCurrency(expense);

      document.getElementById('balance').innerText =
        formatCurrency(income - expense);

    }

    function addTransaction(){

      const description =
        document.getElementById('description').value;

      const amount =
        Number(document.getElementById('amount').value);

      const type =
        document.getElementById('type').value;

      if(description === '' || amount <= 0){
        alert('Preencha todos os campos!');
        return;
      }

      transactions.push({
        description,
        amount,
        type
      });

      updateUI();

      document.getElementById('description').value = '';
      document.getElementById('amount').value = '';

    }

    updateUI();
  </script>
<script>

let transactions =
JSON.parse(localStorage.getItem('transactions')) || [];

function formatCurrency(value){

    return value.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
    });

}

function saveTransactions(){

    localStorage.setItem(
        'transactions',
        JSON.stringify(transactions)
    );

}

function updateUI(){

    const list =
    document.getElementById('transactionList');

    list.innerHTML = '';

    let income = 0;
    let expense = 0;

    transactions.forEach((transaction,index) => {

        if(transaction.type === 'income'){
            income += transaction.amount;
        }else{
            expense += transaction.amount;
        }

        const div =
        document.createElement('div');

        div.classList.add('transaction');

        div.innerHTML = `

            <div>
                <strong>
                    ${transaction.description}
                </strong>
            </div>

            <div style="display:flex; gap:15px; align-items:center;">

                <div class="${
                    transaction.type === 'income'
                    ? 'positive'
                    : 'negative'
                }">

                ${
                    transaction.type === 'income'
                    ? '+'
                    : '-'
                }

                ${formatCurrency(transaction.amount)}

                </div>

                <button
                    onclick="removeTransaction(${index})"
                    style="
                        width:auto;
                        padding:8px 12px;
                        background:#ff4d6d;
                        color:white;
                        border:none;
                        border-radius:10px;
                        cursor:pointer;
                    "
                >
                    <i class="fa-solid fa-trash"></i>
                </button>

            </div>

        `;

        list.appendChild(div);

    });

    document.getElementById('income').innerText =
    '+ ' + formatCurrency(income);

    document.getElementById('expense').innerText =
    '- ' + formatCurrency(expense);

    document.getElementById('balance').innerText =
    formatCurrency(income - expense);

}

function addTransaction(){

    const description =
    document.getElementById('description').value;

    const amount =
    Number(document.getElementById('amount').value);

    const type =
    document.getElementById('type').value;

    if(description === '' || amount <= 0){

        alert('Preencha os campos!');

        return;
    }

    transactions.push({
        description,
        amount,
        type
    });

    saveTransactions();

    updateUI();

    document.getElementById('description').value = '';
    document.getElementById('amount').value = '';

}

function removeTransaction(index){

    transactions.splice(index,1);

    saveTransactions();

    updateUI();

}

updateUI();

</script>
</body>
</html>
